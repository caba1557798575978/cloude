apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sparkapplications.sparkoperator.k8s.io
spec:
  group: sparkoperator.k8s.io
  names:
    kind: SparkApplication
    listKind: SparkApplicationList
    plural: sparkapplications
    shortNames:
    - sparkapp
    - sparkapps
    singular: sparkapplication
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.applicationState.state
      name: State
      type: string
    - jsonPath: .status.driverInfo.podName
      name: Driver
      type: string
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .spec.sparkVersion
      name: SparkVer
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta2
    schema:
      openAPIV3Schema:
        properties:
          spec:
            properties:
              type:
                type: string
              pythonVersion:
                type: string
              mode:
                type: string
              image:
                type: string
              mainApplicationFile:
                type: string
              sparkVersion:
                type: string
              restartPolicy:
                type: object
              driver:
                type: object
              executor:
                type: object
            type: object
          status:
            type: object
        type: object
    served: true
    storage: true
