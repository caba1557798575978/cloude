apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: spark-wordcount
  namespace: default
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: "swr.cn-north-4.myhuaweicloud.com/cloude/spark-wordcount:v1"
  mainApplicationFile: "local:///opt/spark/examples/src/main/python/wordcount.py"
  arguments: ["local:///opt/spark/examples/src/main/resources/kv1.txt"]
  sparkVersion: "3.1.1"
  restartPolicy:
    type: Never
  driver:
    cores: 1
    memory: "1g"
    labels:
      version: 3.1.1
    serviceAccount: spark
  executor:
    instances: 2
    cores: 1
    memory: "1g"
    labels:
      version: 3.1.1