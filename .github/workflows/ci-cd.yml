name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: swr.cn-north-4.myhuaweicloud.com/cloude
  FRONTEND_IMAGE: ${{ secrets.SWR_REGISTRY }}/frontend:v1
  BACKEND_IMAGE: ${{ secrets.SWR_REGISTRY }}/backend:v1

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to SWR
        uses: docker/login-action@v3
        with:
          registry: swr.cn-north-4.myhuaweicloud.com
          username: ${{ secrets.SWR_USERNAME }}
          password: ${{ secrets.SWR_PASSWORD }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./Dockerfile.frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}
            ${{ env.REGISTRY }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./Dockerfile.backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}
            ${{ env.REGISTRY }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Update Frontend Deployment
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ env.REGISTRY }}/frontend:${{ github.sha }} \
            --namespace=default

      - name: Update Backend Deployment
        run: |
          kubectl set image deployment/backend \
            backend=${{ env.REGISTRY }}/backend:${{ github.sha }} \
            --namespace=default

      - name: Verify deployments
        run: |
          echo "=== Frontend Deployment ==="
          kubectl get deployment frontend -n default
          echo ""
          echo "=== Backend Deployment ==="
          kubectl get deployment backend -n default
          echo ""
          echo "=== Pods Status ==="
          kubectl get pods -n default
