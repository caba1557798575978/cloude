name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  SWR_REGISTRY: swr.cn-north-4.myhuaweicloud.com
  SWR_NAMESPACE: cloud-project
  BACKEND_IMAGE_NAME: backend
  FRONTEND_IMAGE_NAME: frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to SWR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.SWR_REGISTRY }}
        username: ${{ secrets.SWR_USERNAME }}
        password: ${{ secrets.SWR_PASSWORD }}

    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: |
          ${{ env.SWR_REGISTRY }}/${{ env.SWR_NAMESPACE }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}
          ${{ env.SWR_REGISTRY }}/${{ env.SWR_NAMESPACE }}/${{ env.BACKEND_IMAGE_NAME }}:latest

    - name: Build and push frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: |
          ${{ env.SWR_REGISTRY }}/${{ env.SWR_NAMESPACE }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
          ${{ env.SWR_REGISTRY }}/${{ env.SWR_NAMESPACE }}/${{ env.FRONTEND_IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    - name: Configure K8s context
      uses: azure/k8s-set-context@v4
      with:
        kubeconfig: ${{ secrets.KUBECONFIG }}

    - name: Update backend deployment
      run: |
        kubectl set image deployment/backend backend=${{ env.SWR_REGISTRY }}/${{ env.SWR_NAMESPACE }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}
        kubectl rollout status deployment/backend

    - name: Update frontend deployment
      run: |
        kubectl set image deployment/frontend frontend=${{ env.SWR_REGISTRY }}/${{ env.SWR_NAMESPACE }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
        kubectl rollout status deployment/frontend